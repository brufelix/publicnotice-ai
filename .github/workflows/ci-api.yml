name: CI · API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "infra/docker/api.Dockerfile"
      - ".github/workflows/ci-api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "infra/docker/api.Dockerfile"
      - ".github/workflows/ci-api.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: publicnotice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/publicnotice_test
          LLM_PROVIDER: ollama
          EMBEDDING_PROVIDER: ollama
        run: uv run pytest -m "not evals" --cov=src --cov-report=term
